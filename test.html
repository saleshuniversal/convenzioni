<!DOCTYPE html>
<html>
<head>
    <title>Test Convenzioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test Connessione Supabase</h1>
    <div id="result">Caricamento...</div>

    <script>
        const supabase = supabase.createClient(
            'https://nsettzmyswlfrnzwvpsq.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zZXR0em15c3dsZnJuend2cHNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMzA0NzIsImV4cCI6MjA4MTYwNjQ3Mn0.OA2B7-6PVOi8XSaM5_r0Dxv_wpbG5I_ImTxaR0sgUoY'
        );

        async function test() {
            try {
                const { data, error } = await supabase
                    .from('convenzioni')
                    .select('*')
                    .limit(5);

                if (error) {
                    document.getElementById('result').innerHTML = 
                        '<h2 style="color:red">ERRORE:</h2><pre>' + JSON.stringify(error, null, 2) + '</pre>';
                } else {
                    document.getElementById('result').innerHTML = 
                        '<h2 style="color:green">SUCCESSO! ' + data.length + ' aziende caricate</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (err) {
                document.getElementById('result').innerHTML = 
                    '<h2 style="color:red">ERRORE CATCH:</h2><pre>' + err.message + '</pre>';
            }
        }

        test();
    </script>
</body>
</html>
